name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Compile CV and upload the site as a Pages artifact ──────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            lmodern

      - name: Compile CV
        run: |
          cd cv
          pdflatex -interaction=nonstopmode cv.tex
          pdflatex -interaction=nonstopmode cv.tex   # second pass → correct page count
          rm -f cv.aux cv.log cv.out cv.fls cv.fdb_latexmk

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'    # deploy the whole repo root (index.html, academic.html, assets/, cv/)

  # ── 2. Deploy the artifact to GitHub Pages ─────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
